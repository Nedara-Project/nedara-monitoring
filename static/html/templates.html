<html>

    <!-- Web App Status Card -->
    <template id="web-app-card">
        <div class="dash-card">
            <div class="card-header">
                <div class="status-indicator" id="web-url-status"></div>
                <span class="card-title">Web Application</span>
            </div>
            <div class="metric-item">
                <span class="metric-label">Status</span>
                <span class="metric-value-text" id="web-url-status-text">Checking…</span>
            </div>
            <div class="metric-item">
                <span class="metric-label">Response</span>
                <span class="metric-value-text" id="web-url-response-time">—</span>
            </div>
            <div id="web-url-link-container"></div>
        </div>
    </template>

    <!-- Linux server metrics card -->
    <template id="linux-server">
        <div class="dash-card server-card">
            <div class="card-header">
                <div class="status-indicator status-linux-server {{health_class}}" id="{{id}}" data-name="{{name}}"></div>
                <span class="card-title">{{name}}</span>
                {{#if logs}}<a href="#" class="logs-link open_logs" data-source="{{name}}">Logs</a>{{/if}}
            </div>
            <div class="metric-bar-row">
                <div class="metric-bar-header">
                    <span class="metric-label">CPU</span>
                    <span class="metric-value-sm {{cpu_value_class}}">{{cpu_usage}}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-value {{cpu_usage_class}}" style="width:{{cpu_usage}}%"></div>
                </div>
            </div>
            <div class="metric-bar-row">
                <div class="metric-bar-header">
                    <span class="metric-label">RAM</span>
                    <span class="metric-value-sm {{ram_value_class}}">{{ram_usage_percent}}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-value {{ram_usage_class}}" style="width:{{ram_usage_percent}}%"></div>
                </div>
            </div>
            <div class="metric-bar-row">
                <div class="metric-bar-header">
                    <span class="metric-label">Disk</span>
                    <span class="metric-value-sm {{storage_value_class}}">{{storage_usage_percent}}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-value {{storage_usage_class}}" style="width:{{storage_usage_percent}}%"></div>
                </div>
                <div class="metric-detail">{{storage_used}} / {{storage_size}} — {{storage_available}} free</div>
            </div>
        </div>
    </template>

    <!-- Unreachable server card -->
    <template id="linux-server-unreachable">
        <div class="dash-card server-card server-card-unreachable">
            <div class="card-header">
                <div class="status-indicator status-critical" id="{{id}}" data-name="{{name}}"></div>
                <span class="card-title">{{name}}</span>
            </div>
            <div class="unreachable-message">Server unreachable</div>
        </div>
    </template>

    <!-- PostgreSQL panel -->
    <template id="postgres-panel">
        <div class="panel-heading">
            <div class="status-indicator status-healthy" id="postgres-status" data-name="postgres"></div>
            <span class="panel-title">PostgreSQL</span>
            <button class="panel-expand-btn" data-panel="postgres" title="Fullscreen">⤢</button>
        </div>
        <div class="stats-grid">
            <div class="stat-item">Database <span id="main-db"></span></div>
            <div class="stat-item">Active Queries <span id="query-count"></span></div>
            <div class="stat-item">Avg Wait (Active) <span id="avg-wait-time-active"></span></div>
            <div class="stat-item">Avg Wait (Idle) <span id="avg-wait-time-idle"></span></div>
            <div class="stat-item col-span-2">Size (uncompressed) <span id="postgres-db-size"></span></div>
        </div>
        <div class="panel-filters">
            <button id="filter-active">Active</button>
            <button id="filter-idle">Idle</button>
            <button id="filter-all" class="active">All</button>
            <select id="database-selector" class="filter-select" style="margin-left:auto">
                <option value="all">All Databases</option>
            </select>
        </div>
        <div class="table-wrapper">
            <table class="data-table" id="postgres-queries">
                <thead>
                    <tr>
                        <th>Info</th>
                        <th>State</th>
                        <th>Wait Event</th>
                        <th>Wait Time</th>
                        <th style="width:52%">Query</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </template>

    <!-- Logs modal -->
    <template id="modal-logs">
        <div class="modal-overlay active" id="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="modal-title">Logs — {{source}}</span>
                    <button class="modal-close" id="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="log-container" id="modal-log-container"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- Processes panel -->
    <template id="processes-panel">
        <div class="panel-heading">
            <span class="panel-title">Processes</span>
            <button class="panel-expand-btn" data-panel="processes" title="Fullscreen">⤢</button>
            <select id="server-selector" class="filter-select" style="margin-left:auto">
                <option value="all">All Servers</option>
            </select>
        </div>
        <div class="table-wrapper">
            <table class="data-table" id="processes-table">
                <thead>
                    <tr>
                        <th>Server</th>
                        <th>User</th>
                        <th>PID</th>
                        <th>CPU %</th>
                        <th>RAM %</th>
                        <th>Command</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </template>

    <!-- PGBouncer panel -->
    <template id="pgbouncer-panel">
        <div class="panel-heading">
            <div class="status-indicator status-healthy" id="pgbouncer-status"></div>
            <span class="panel-title">PGBouncer</span>
            <button class="panel-expand-btn" data-panel="pgbouncer" title="Fullscreen">⤢</button>
        </div>
        <div class="stats-grid">
            <div class="stat-item">Active Clients <span id="pgb-cl-active">—</span></div>
            <div class="stat-item">Waiting <span id="pgb-cl-waiting">—</span></div>
            <div class="stat-item">Active Servers <span id="pgb-sv-active">—</span></div>
            <div class="stat-item">Idle Servers <span id="pgb-sv-idle">—</span></div>
            <div class="stat-item">Requests/s <span id="pgb-qps">—</span></div>
            <div class="stat-item">Max Wait <span id="pgb-max-wait">—</span></div>
            <div class="stat-item">Avg Query <span id="pgb-avg-query">—</span></div>
            <div class="stat-item">Pool Size <span id="pgb-pool-size">—</span></div>
        </div>
        <div class="table-wrapper">
            <table class="data-table" id="pgbouncer-pools">
                <thead>
                    <tr>
                        <th>Database</th>
                        <th>User</th>
                        <th>Active Cl.</th>
                        <th>Waiting</th>
                        <th>Active Sv.</th>
                        <th>Idle Sv.</th>
                        <th>Max Wait</th>
                        <th>Mode</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </template>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ display_name }}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Anti-FOUC: apply saved theme before any render -->
    <script>
        (function () {
            const t = localStorage.getItem('nedara-theme') || 'auto';
            const dark = t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (dark) document.documentElement.classList.add('dark');
        })();
    </script>

    <!-- Tailwind: layout utilities only (no dark: variants) -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        body { @apply font-sans antialiased; }
    </style>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/monitoring.css') }}">
    <script src="{{ url_for('static', filename='js/lib/jquery/jquery.min.js') }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="{{ url_for('static', filename='js/lib/underscorejs/underscore.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/lib/nedarajs/nedara.js') }}" type="module"></script>
    <script src="{{ url_for('static', filename='js/monitoring.js') }}" type="module"></script>
</head>
<body>

    <!-- Loading screen -->
    <div id="loading-container">
        <div class="wave-container">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>
        <p class="loading-text">Loading {{ display_name }}…</p>
    </div>

    <!-- Dashboard (hidden until first data arrives) -->
    <div id="monitoring" style="display:none;">

        <!-- Sticky top bar -->
        <header id="topbar">
            <div class="topbar-brand">
                <div id="status-badge">
                    <div class="status-indicator status-healthy" id="overall-status"></div>
                    <span id="status-text">Operational</span>
                </div>
                <h1 id="app-title">{{ display_name }}</h1>
            </div>
            <div class="topbar-controls">
                <span class="topbar-time">
                    Updated <span id="last-update-time">—</span>
                </span>
                <a href="#" id="refresh-interface" title="Refresh">↺</a>
                <select id="environment-selector" class="filter-select">
                    {% for env in environments %}
                    <option value="{{ env }}">{{ env }}</option>
                    {% endfor %}
                </select>
                <span id="mail-indicator" class="topbar-mail-indicator" style="display:none" title="Notifications email actives">✉ Mail</span>
                <button id="theme-toggle" class="btn-theme" title="Cycle theme: Auto → Light → Dark">
                    <span id="theme-icon">⊙</span>
                    <span id="theme-label">Auto</span>
                </button>
            </div>
        </header>

        <!-- Scrollable content -->
        <main id="dashboard-main">

            <!-- Server overview row -->
            <div id="section-servers">
                <div id="web-app-card"></div>
                <div id="linux-servers-row"></div>
            </div>

            <!-- Charts grid (2 per row) -->
            <div id="section-charts">
                <div class="dash-card chart-card" id="chart-panel-cpu">
                    <div class="chart-header"><button class="chart-expand-btn" title="Fullscreen">⤢</button><span class="chart-title">CPU Usage %</span></div>
                    <div id="CPUChart" class="chart-inner"></div>
                </div>
                <div class="dash-card chart-card" id="chart-panel-http">
                    <div class="chart-header"><button class="chart-expand-btn" title="Fullscreen">⤢</button><span class="chart-title">HTTP Requests</span></div>
                    <div id="httpRequestsChart" class="chart-inner"></div>
                </div>
                <div class="dash-card chart-card" id="chart-panel-ram">
                    <div class="chart-header"><button class="chart-expand-btn" title="Fullscreen">⤢</button><span class="chart-title">RAM Usage %</span></div>
                    <div id="RAMChart" class="chart-inner"></div>
                </div>
                <div class="dash-card chart-card" id="chart-panel-loadavg">
                    <div class="chart-header"><button class="chart-expand-btn" title="Fullscreen">⤢</button><span class="chart-title">Load Average (1m)</span></div>
                    <div id="LoadAvgChart" class="chart-inner"></div>
                </div>
                <div class="dash-card chart-card" id="chart-panel-network">
                    <div class="chart-header"><button class="chart-expand-btn" title="Fullscreen">⤢</button><span class="chart-title">Network (MB/s)</span></div>
                    <div id="NetworkChart" class="chart-inner"></div>
                </div>
                <div class="dash-card chart-card" id="chart-panel-diskio">
                    <div class="chart-header"><button class="chart-expand-btn" title="Fullscreen">⤢</button><span class="chart-title">Disk I/O (MB/s)</span></div>
                    <div id="DiskIOChart" class="chart-inner"></div>
                </div>
            </div>

            <!-- Details row: PostgreSQL + Processes + PGBouncer (when configured) -->
            <div id="section-details">
                <div class="dash-card detail-panel" id="postgres-panel" style="display:none"></div>
                <div class="dash-card detail-panel" id="processes-panel"></div>
                <div class="dash-card detail-panel" id="pgbouncer-panel" style="display:none"></div>
            </div>

        </main>
        <footer id="dashboard-footer">
            <a href="https://github.com/Nedara-Project/nedara-monitoring" target="_blank" rel="noopener noreferrer">Powered by Nedara Monitoring</a>
        </footer>
    </div>

</body>
</html>
